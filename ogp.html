<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1200" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #ffffff;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .container {
      width: 100%;
      height: 100%;
      padding: 64px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 48px;
      border: 2px solid #f0f0f0;
      position: relative;
    }
    .top {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .name {
      font-size: 26px;
      font-weight: 400;
      color: #999;
      letter-spacing: 0.08em;
    }
    .catch {
      font-size: 58px;
      font-weight: 700;
      color: #111;
      line-height: 1.3;
      letter-spacing: -0.01em;
    }
    .tags {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 20px;
      color: #444;
      background: #f5f5f5;
      padding: 8px 20px;
      border-radius: 100px;
    }
    .bottom {
      position: absolute;
      bottom: 48px;
      left: 80px;
      right: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .url {
      font-size: 20px;
      color: #bbb;
      letter-spacing: 0.03em;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <p class="name">しゅんぺ</p>
      <p class="catch">人生の寄り道を、<br>仕事にしている人</p>
      <div class="tags">
        <span class="tag">🔬 人生1ミリ研究所</span>
        <span class="tag">🎮 チームグンマサイタマゲーム</span>
        <span class="tag">🎨 クリエイター</span>
      </div>
    </div>
    <div class="bottom">
      <p class="url">shunpedesu.github.io</p>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
