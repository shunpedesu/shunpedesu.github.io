name: radio-kit

# 毎朝、番組RSSの最新エピソードを取得して radio-kit/latest.json を更新する。
# RSSフィードURLは Settings > Secrets and variables > Actions > Variables に
# PODCAST_RSS_URL という名前で登録すること。

on:
  schedule:
    - cron: "0 22 * * *" # 07:00 JST（UTC 22:00）
  workflow_dispatch: {}    # 手動実行も可

permissions:
  contents: write

concurrency:
  group: radio-kit
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest episode
        env:
          PODCAST_RSS_URL: ${{ vars.PODCAST_RSS_URL }}
        run: node radio-kit/build.mjs

      - name: Commit if changed
        run: |
          git config user.name "radio-kit-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add radio-kit/latest.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore(radio-kit): update latest episode [skip ci]"
            git push
          fi
